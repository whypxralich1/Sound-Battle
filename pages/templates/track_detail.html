{% extends 'base.html' %}

{% block title %}{{ track.title }} | BeatBattle{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h1 class="display-4">{{ track.title }}</h1>
                    <h3 class="text-muted mb-4">Исполнитель: {{ track.artist }}</h3>
                    
                    <hr>
                    
                    <div class="my-4">
                        <h5>О треке:</h5>
                        <p class="lead">Этот трек готов к битве в системе BeatBattle. Проверьте свои навыки угадывания!</p>
                        </div>

                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Назад к списку
                        </a>
                        <button class="btn btn-primary btn-lg">Начать баттл</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
